name: Build Windows & Android App

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'mobile_app/**'
      - '.github/workflows/build-windows-app.yml'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  SECRET_KEY: ${{ secrets.SECRET_KEY || 'a' }}

jobs:
  build-windows:
    name: Build Windows Release
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'
          cache: false

      - name: Build Windows Application
        run: |
          cd mobile_app
          flutter build windows --release --tree-shake-icons

      - name: List build output
        if: always()
        run: |
          echo "=== Windows build output ==="
          dir mobile_app\build\windows\runner\Release\ 2>&1 || echo "Directory not found"
          echo "=== Full mobile_app/build tree ==="
          dir mobile_app\build\ /s 2>&1 || echo "Build directory not found"

      - name: Upload Windows EXE artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: windows-app-exe
          path: mobile_app/build/windows/runner/Release/
          retention-days: 30

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'

      - name: Get Flutter dependencies
        run: |
          cd mobile_app
          flutter pub get

      - name: Build Android APK
        run: |
          cd mobile_app
          flutter build apk --release --tree-shake-icons

      - name: List build output
        if: always()
        run: |
          echo "=== Android build output ==="
          ls -la mobile_app/build/app/outputs/flutter-apk/ 2>&1 || echo "Directory not found"
          echo "=== Full mobile_app/build tree ==="
          find mobile_app/build -type f -name "*.apk" 2>&1 || echo "No APK files found"

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: android-app-apk
          path: mobile_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  release:
    name: Create Release with Artifacts
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-app-exe
          path: ./windows-app

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-app-apk
          path: ./android-app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./windows-app/mobile_app.exe
            ./android-app/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build notification
        if: success()
        run: |
          echo "✓ Windows & Android apps built successfully!"
          echo "Download from: Actions > Build Windows & Android App > Artifacts"
          echo "Windows EXE: windows-app-exe"
          echo "Android APK: android-app-apk"
