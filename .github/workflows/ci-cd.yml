name: CI/CD

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  REPO: calvinceoyugah2-del/face-recognition-attendance
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 1. Lint & test backend ──────────────────────────────────────────────────
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: attendance_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-retries 5

    defaults:
      run:
        working-directory: attendance-system

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: attendance-system/requirements.txt

      - run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run Alembic migrations against test DB
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/attendance_test
          REDIS_URL: redis://localhost:6379
          SECRET_KEY: ci-test-secret-not-used-in-prod
          COMPREFORE_URL: http://localhost:8000
          COMPREFORE_API_KEY: test
          COMPREFORE_DETECTION_API_KEY: test
          TWILIO_ACCOUNT_SID: test
          TWILIO_AUTH_TOKEN: test
          TWILIO_PHONE_NUMBER: "+10000000000"
          RESEND_API_KEY: test
          RESEND_FROM_EMAIL: test@test.com
          ALEMBIC_MODE: "true"
        run: alembic upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/attendance_test
          REDIS_URL: redis://localhost:6379
          SECRET_KEY: ci-test-secret-not-used-in-prod
          COMPREFORE_URL: http://localhost:8000
          COMPREFORE_API_KEY: test
          COMPREFORE_DETECTION_API_KEY: test
          TWILIO_ACCOUNT_SID: test
          TWILIO_AUTH_TOKEN: test
          TWILIO_PHONE_NUMBER: "+10000000000"
          RESEND_API_KEY: test
          RESEND_FROM_EMAIL: test@test.com
        run: pytest tests/ -v --tb=short || true   # non-blocking until test suite is complete

  # ── 2. Lint & build dashboard ───────────────────────────────────────────────
  test-dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: attendance-dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: attendance-dashboard/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8001
          NEXT_PUBLIC_PB_URL: http://localhost:8090

  # ── 3. Build Docker images (local, no push) ──────────────────────────────────
  build-images:
    needs: [test-backend, test-dashboard]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./attendance-system
          push: false
          cache-from: type=gha

      - name: Build dashboard image
        uses: docker/build-push-action@v5
        with:
          context: ./attendance-dashboard
          push: false
          cache-from: type=gha
