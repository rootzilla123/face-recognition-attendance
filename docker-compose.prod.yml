version: "3.8"

# Production compose — no dev tools (no mailpit, no exposed DB ports)
# Run with: docker compose -f docker-compose.prod.yml up -d
# Secrets are injected from the host environment or a .env file that is NOT committed.

services:

  # ── Postgres ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: attendance_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d attendance_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Not exposed externally — only reachable inside the compose network

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── PocketBase ──────────────────────────────────────────────────────────────
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    restart: unless-stopped
    volumes:
      - pocketbase_data:/pb/pb_data
      - ./pb_migrations:/pb/pb_migrations
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── CompreFace ──────────────────────────────────────────────────────────────
  compreface-postgres-db:
    image: exadel/compreface-postgres-db:1.2.0
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${CF_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${CF_POSTGRES_PASSWORD}
      POSTGRES_DB: frs
    volumes:
      - compreface_data:/var/lib/postgresql/data

  compreface-admin:
    image: exadel/compreface-admin:1.2.0
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${CF_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${CF_POSTGRES_PASSWORD}
      POSTGRES_URL: jdbc:postgresql://compreface-postgres-db:5432/frs
      SPRING_PROFILES_ACTIVE: prod
      ENABLE_EMAIL_SERVER: "false"
      ADMIN_JAVA_OPTS: -Xmx2g
    depends_on:
      compreface-postgres-db:
        condition: service_started

  compreface-api:
    image: exadel/compreface-api:1.2.0
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${CF_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${CF_POSTGRES_PASSWORD}
      POSTGRES_URL: jdbc:postgresql://compreface-postgres-db:5432/frs
      SPRING_PROFILES_ACTIVE: prod
      API_JAVA_OPTS: -Xmx2g
    depends_on:
      compreface-postgres-db:
        condition: service_started
      compreface-admin:
        condition: service_started

  compreface-core:
    image: exadel/compreface-core:1.2.0
    restart: unless-stopped
    environment:
      ML_PORT: "3000"
    depends_on:
      compreface-postgres-db:
        condition: service_started

  compreface-fe:
    image: exadel/compreface-fe:1.2.0
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      CLIENT_MAX_BODY_SIZE: 10M
      PROXY_READ_TIMEOUT: 300s
      PROXY_CONNECT_TIMEOUT: 10s
    depends_on:
      - compreface-api
      - compreface-admin

  # ── Ollama (AI Chatbot) ──────────────────────────────────────────────────────
  # Runs llama3.2 locally — no external API costs.
  # GPU passthrough optional: add 'deploy.resources.reservations.devices' for NVIDIA.
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: "0.0.0.0"
    # Pull the model on first start
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull llama3.2:latest && wait"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    image: ghcr.io/calvinceoyugah2-del/face-recognition-attendance/backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env          # .env is NOT committed — populated by CI or operator
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/attendance_db
      REDIS_URL: redis://redis:6379
      COMPREFORE_URL: http://compreface-api:8080
      OLLAMA_URL: http://ollama:11434
      GOOGLE_APPLICATION_CREDENTIALS: /app/firebase-service-account.json
    volumes:
      - ./firebase-service-account.json:/app/firebase-service-account.json:ro
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/api/v1/health')\""]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── Next.js dashboard ───────────────────────────────────────────────────────
  dashboard:
    image: ghcr.io/calvinceoyugah2-del/face-recognition-attendance/dashboard:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_PB_URL: ${NEXT_PUBLIC_PB_URL}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

  # ── GlitchTip (self-hosted error monitoring) ─────────────────────────────────
  glitchtip-postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: glitchtip
      POSTGRES_USER: ${GT_POSTGRES_USER:-glitchtip}
      POSTGRES_PASSWORD: ${GT_POSTGRES_PASSWORD}
    volumes:
      - glitchtip_pg_data:/var/lib/postgresql/data

  glitchtip:
    image: glitchtip/glitchtip:latest
    restart: unless-stopped
    depends_on:
      - glitchtip-postgres
      - redis
    environment:
      DATABASE_URL: postgresql://${GT_POSTGRES_USER:-glitchtip}:${GT_POSTGRES_PASSWORD}@glitchtip-postgres:5432/glitchtip
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY}
      EMAIL_URL: ${GLITCHTIP_EMAIL_URL:-consolemail://}
      GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN:-http://localhost:8085}
      DEFAULT_FROM_EMAIL: ${SENDGRID_FROM_EMAIL}
      CELERY_WORKER_CONCURRENCY: 2
    ports:
      - "8085:8000"

  glitchtip-worker:
    image: glitchtip/glitchtip:latest
    restart: unless-stopped
    command: ./bin/run-celery-with-beat.sh
    depends_on:
      - glitchtip-postgres
      - redis
    environment:
      DATABASE_URL: postgresql://${GT_POSTGRES_USER:-glitchtip}:${GT_POSTGRES_PASSWORD}@glitchtip-postgres:5432/glitchtip
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY}

  # ── Cloudflare Tunnel ────────────────────────────────────────────────────────
  # Exposes the app globally — no public IP or port forwarding needed.
  # CLOUDFLARE_TUNNEL_TOKEN comes from: Cloudflare Zero Trust → Tunnels → Create tunnel → copy token
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate --protocol http2 run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - dashboard
      - backend
      - pocketbase

volumes:
  postgres_data:
  redis_data:
  pocketbase_data:
  compreface_data:
  glitchtip_pg_data:
  ollama_data:
