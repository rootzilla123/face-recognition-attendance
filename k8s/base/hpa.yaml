# HPA scales the dashboard (Next.js) — stateless, safe to scale
# Backend is intentionally kept at 1 replica because VideoStreamingService
# opens camera connections per-process; multiple replicas = duplicate attendance records.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dashboard-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dashboard
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
