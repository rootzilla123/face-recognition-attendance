# Secret values are base64-encoded and injected by CI from GitHub Actions secrets.
# To create manually:
#   kubectl -n production create secret generic app-secrets \
#     --from-literal=DATABASE_URL="..." \
#     --from-literal=REDIS_URL="..." \
#     ... etc
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
type: Opaque
# data keys must match what the Deployments reference via envFrom / env
# Values are populated by CI — do not hardcode here
