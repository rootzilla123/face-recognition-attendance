apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
spec:
  replicas: 1  # Must be 1 — VideoStreamingService opens cameras per-process; multiple replicas = duplicate attendance
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0        # zero-downtime: always keep current replicas up
  template:
    metadata:
      labels:
        app: backend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: run-migrations
          image: ghcr.io/calvinceoyugah2-del/face-recognition-attendance/backend:latest
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - secretRef:
                name: app-secrets
      containers:
        - name: backend
          image: ghcr.io/calvinceoyugah2-del/face-recognition-attendance/backend:latest
          ports:
            - containerPort: 8001
          envFrom:
            - secretRef:
                name: app-secrets
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
    - port: 8001
      targetPort: 8001
